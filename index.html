  <!-- Global Error Handler for Debugging -->
  <script>
    window.onerror = function (message, source, lineno, colno, error) {
      const errDiv = document.createElement('div');
      errDiv.style.position = 'fixed';
      errDiv.style.top = '0';
      errDiv.style.left = '0';
      errDiv.style.width = '100%';
      errDiv.style.background = 'rgba(220, 50, 50, 0.95)';
      errDiv.style.color = 'white';
      errDiv.style.padding = '1rem';
      errDiv.style.zIndex = '99999';
      errDiv.style.fontFamily = 'monospace';
      errDiv.style.fontSize = '0.9rem';
      errDiv.style.lineHeight = '1.4';
      errDiv.style.boxShadow = '0 4px 12px rgba(0,0,0,0.3)';
      errDiv.innerHTML = '<strong>JavaScript Error:</strong> ' + message + '<br><small>at ' + source + ':' + lineno + ':' + colno + '</small>';
      document.body.appendChild(errDiv);
      return false;
    };
  </script>

  <!-- Lucide Icons CDN -->
